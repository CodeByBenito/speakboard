<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <style>
    .border { fill: #ff6a00; } /* Neon Orange */
    .page { fill: #ffffff; } /* Book Pages */
    .ribbon { fill: #ff3c00; } /* Bookmark ribbon */
    .text-line { fill: #cbd5e1; } /* Slate-300 for readable lines */
  </style>

  <!-- Left Cover Outer Border -->
  <rect x="0" y="3" width="1" height="9" class="border" />
  <rect x="1" y="2" width="6" height="1" class="border" />
  <rect x="1" y="12" width="6" height="1" class="border" />

  <!-- Right Cover Outer Border -->
  <rect x="15" y="3" width="1" height="9" class="border" />
  <rect x="9" y="2" width="6" height="1" class="border" />
  <rect x="9" y="12" width="6" height="1" class="border" />

  <!-- Spine Center -->
  <rect x="7" y="2" width="2" height="11" class="border" />

  <!-- Pages Left -->
  <rect x="1" y="3" width="6" height="9" class="page" />
  <!-- Pages Right -->
  <rect x="9" y="3" width="6" height="9" class="page" />

  <!-- Left Page Lines (Simulating Text) -->
  <rect x="2" y="5" width="4" height="1" class="text-line" />
  <rect x="2" y="7" width="4" height="1" class="text-line" />
  <rect x="2" y="9" width="3" height="1" class="text-line" />

  <!-- Right Page Lines (Simulating Text) -->
  <rect x="10" y="5" width="4" height="1" class="text-line" />
  <rect x="10" y="7" width="4" height="1" class="text-line" />
  <rect x="11" y="9" width="3" height="1" class="text-line" />

  <!-- Bookmark Ribbon (Red/Orange hanging out) -->
  <rect x="8" y="3" width="1" height="10" class="ribbon" />
  <rect x="9" y="12" width="1" height="2" class="ribbon" />
</svg>
